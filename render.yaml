services:
  - type: web
    name: xiaohongshu-ratecard-automation
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATA_DIR
        value: /opt/render/project/src/data
      - key: DATABASE_PATH
        value: /opt/render/project/src/data/app.db
      - key: STORAGE_DIR
        value: /opt/render/project/src
      - key: SECRET_KEY
        generateValue: true
      - key: OPENAI_BASE_URL
        value: https://api.openai.com/v1
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
